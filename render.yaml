# Render Blueprint — deploys the MooMetrics BACKEND (API + PostgreSQL).
# Deploy with `render blueprint apply` (or via the Render dashboard).
# Docs: https://docs.render.com/blueprint-spec
#
# The FRONTEND deploys to Vercel from frontend/vercel.json (import the repo
# in Vercel with root directory `frontend`, set VITE_BACKEND_URL to this
# API's https origin). docker-compose.yml remains local-development only.
# Deploy order: apply this blueprint first -> deploy Vercel with the API URL
# -> set FRONTEND_URL below to the Vercel domain (CORS + refresh cookie).
#
# !! VALIDATE ON RENDER: plan identifiers should be confirmed in the Render
#    dashboard on first apply — they are not verifiable locally.

services:
  # --- Backend API (FastAPI) ---
  - type: web
    name: moometrics-api
    runtime: python
    region: oregon
    plan: starter            # paid tier: persistent disk + always-on
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # Persists uploaded death-report images across deploys. Mounted at the
    # backend working dir's `uploads/` so it matches StaticFiles + UPLOAD_DIR.
    disk:
      name: moometrics-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: moometrics-db
          property: connectionString
      # Operator sets a strong password in the dashboard; the app refuses to
      # boot in production if this is left at the default.
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      # The Vercel frontend's https origin (e.g. https://moometrics.vercel.app).
      # Set in the dashboard after the first Vercel deploy — drives CORS and
      # the cross-site refresh cookie (SameSite=None; Secure in production).
      - key: FRONTEND_URL
        sync: false
      # Relative path under the persistent disk mount above.
      - key: UPLOAD_DIR
        value: uploads/deaths
      # Image storage: 'local' (persistent disk) or 's3' (set S3_* below for R2).
      - key: STORAGE_BACKEND
        value: local
      # Short-lived access tokens + revocable refresh cookie.
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      # Structured JSON logs for aggregation.
      - key: LOG_FORMAT
        value: json
      # Optional error tracking — set in the dashboard to enable (no-op if empty).
      - key: SENTRY_DSN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: moometrics-db
    # Paid plan → automated daily backups + point-in-time recovery. Farm
    # records are irreplaceable; the free tier has NO backups and expires.
    plan: basic-256mb
    region: oregon
    databaseName: moometrics
    user: moometrics
