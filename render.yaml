# Render Blueprint — deploys the MooMetrics BACKEND API on the FREE tier.
# No credit card required anywhere in this stack:
#   API      -> Render free web service (this file)
#   Database -> Neon free Postgres  (https://neon.tech — DATABASE_URL below)
#   Images   -> Backblaze B2 free 10GB, S3-compatible (S3_* vars below)
#   Frontend -> Vercel Hobby, from frontend/vercel.json (root dir `frontend`,
#               VITE_BACKEND_URL = this API's https origin)
#
# !! Render Blueprints require payment info on file EVEN for free services.
# On a card-free account, do NOT `render blueprint apply` — create the service
# manually (dashboard -> New -> Web Service) with the settings below; the
# manual path never asks for a card. Full walkthrough: docs/RUNBOOK.md.
#
# Deploy order: create Neon DB + B2 bucket -> create the web service and fill
# the sync:false vars -> deploy Vercel with the API URL -> set FRONTEND_URL
# below to the Vercel domain (drives CORS + the cross-site refresh cookie).
#
# Free-tier trade-offs (documented in docs/RUNBOOK.md):
#   - service spins down after ~15 min idle; first request takes ~1 min
#   - no persistent disk, hence external Postgres + object storage
#   - no automated DB backups — run periodic manual `pg_dump`
# For irreplaceable production farm data, the paid path (starter plan +
# managed Postgres with daily backups, ~$14/mo) remains the responsible option.

services:
  # --- Backend API (FastAPI) ---
  - type: web
    name: moometrics-api
    runtime: python
    region: oregon
    plan: free               # no card; spins down after ~15 min idle
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Neon connection string (postgresql://...@...neon.tech/...?sslmode=require).
      # Free instances have no disk, so the database must live off-box.
      - key: DATABASE_URL
        sync: false
      # Operator sets a strong password in the dashboard; the app refuses to
      # boot in production if this is left at the default.
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      # The Vercel frontend's https origin (e.g. https://moometrics.vercel.app).
      # Set in the dashboard after the first Vercel deploy — drives CORS and
      # the cross-site refresh cookie (SameSite=None; Secure in production).
      - key: FRONTEND_URL
        sync: false
      # Death-report images go to S3-compatible object storage (Backblaze B2
      # free tier). The bucket can stay PRIVATE: with no S3_PUBLIC_BASE_URL
      # set, the app serves images via time-limited presigned URLs.
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        sync: false
      # B2 S3 endpoint, e.g. https://s3.us-west-004.backblazeb2.com
      - key: S3_ENDPOINT_URL
        sync: false
      # B2 region from the endpoint, e.g. us-west-004
      - key: S3_REGION
        sync: false
      # B2 application key pair (keyID / applicationKey), scoped to the bucket.
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      # Short-lived access tokens + revocable refresh cookie.
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      # Structured JSON logs for aggregation.
      - key: LOG_FORMAT
        value: json
      # Optional error tracking — set in the dashboard to enable (no-op if empty).
      - key: SENTRY_DSN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
